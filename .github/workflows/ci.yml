name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  sim:
    name: sim (typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # リポジトリルートは pnpm workspaces (packages/sim, packages/web)。
      # web が sim のソースを直接 import するため、ルートで一度に
      # install して両パッケージの依存を解決しておく必要がある
      # (個別 install だと web 側から sim の依存 (seedrandom 等) が
      # 解決できない)。
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: packages/sim
        run: pnpm run typecheck

      - name: Test
        working-directory: packages/sim
        run: pnpm test

  web:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: packages/web
        run: pnpm run typecheck

      - name: Build
        working-directory: packages/web
        run: pnpm run build
