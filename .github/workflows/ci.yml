name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  sim:
    name: sim (typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # リポジトリルートは npm workspaces (packages/sim, packages/web)。
      # web が sim のソースを直接 import するため、ルートで一度に
      # install して両パッケージの依存を共通の node_modules に
      # hoist しておく必要がある (個別 install だと web 側から
      # sim の依存 (seedrandom 等) が解決できない)。
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        working-directory: packages/sim
        run: npm run typecheck

      - name: Test
        working-directory: packages/sim
        run: npm test

  web:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        working-directory: packages/web
        run: npm run typecheck

      - name: Build
        working-directory: packages/web
        run: npm run build
