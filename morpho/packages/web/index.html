<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d0c" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='22' fill='%23f0c861'/%3E%3Ccircle cx='32' cy='32' r='10' fill='%23b8861f'/%3E%3C/svg%3E" />
    <title>モルフォ — 委ねて、育ついのち</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="title">
          <h1>モルフォ</h1>
          <span class="subtitle">委ねて、育ついのち</span>
        </div>
        <div class="time">
          <div class="day">DAY <span id="day">0</span></div>
          <div class="era" id="era">胞子期</div>
          <div class="controls">
            <button data-speed="0" class="speed" title="一時停止">⏸</button>
            <button data-speed="1" class="speed active" title="再生">▶</button>
            <button data-speed="4" class="speed" title="早送り">⏩</button>
            <button data-speed="16" class="speed" title="超早送り">⏭</button>
          </div>
        </div>
      </header>

      <main class="stage">
        <aside class="panel left">
          <section class="card">
            <h2>メインクエスト</h2>
            <div class="quest">大陸全体に栄養を届けよう</div>
            <div class="progress"><div id="quest-bar" class="bar"></div></div>
            <div class="quest-pct"><span id="quest-pct">0</span>%</div>
          </section>

          <section class="card">
            <h2>ワールド情報</h2>
            <dl class="kv">
              <dt>総面積</dt><dd><span id="w-area">0</span> m²</dd>
              <dt>粘菌の総量</dt><dd><span id="w-mass">0.00</span> kg</dd>
              <dt>接続ネットワーク</dt><dd id="w-links">0</dd>
              <dt>拠点 (コロニー)</dt><dd><span id="w-cr">0</span>/<span id="w-ct">0</span></dd>
            </dl>
          </section>

          <section class="card">
            <h2>環境バランス</h2>
            <div class="trait">
              <span class="ico-lbl"><i class="dot dot-light"></i>光</span>
              <div class="progress"><div id="e-light" class="bar light"></div></div>
              <span class="num" id="e-light-n">0%</span>
            </div>
            <div class="trait">
              <span class="ico-lbl"><i class="dot dot-temp"></i>温度</span>
              <div class="progress"><div id="e-temp" class="bar temp"></div></div>
              <span class="num" id="e-temp-n">0%</span>
            </div>
            <div class="trait">
              <span class="ico-lbl"><i class="dot dot-moisture"></i>湿度</span>
              <div class="progress"><div id="e-moisture" class="bar moisture"></div></div>
              <span class="num" id="e-moisture-n">0%</span>
            </div>
            <div class="trait">
              <span class="ico-lbl"><i class="dot dot-nutrient"></i>栄養</span>
              <div class="progress"><div id="e-nutrient" class="bar nutrient"></div></div>
              <span class="num" id="e-nutrient-n">0%</span>
            </div>
            <div class="trait">
              <span class="ico-lbl"><i class="dot dot-toxin"></i>毒素</span>
              <div class="progress"><div id="e-toxin" class="bar toxin"></div></div>
              <span class="num" id="e-toxin-n">0%</span>
            </div>
          </section>

          <section class="card">
            <h2>個性</h2>
            <div class="trait">
              <span class="lbl">探索性</span>
              <div class="progress"><div id="t-explore" class="bar"></div></div>
              <span class="num" id="t-explore-n">0%</span>
            </div>
            <div class="trait">
              <span class="lbl">効率性</span>
              <div class="progress"><div id="t-efficient" class="bar"></div></div>
              <span class="num" id="t-efficient-n">0%</span>
            </div>
            <div class="trait">
              <span class="lbl">安定性</span>
              <div class="progress"><div id="t-stable" class="bar"></div></div>
              <span class="num" id="t-stable-n">0%</span>
            </div>
          </section>
        </aside>

        <div class="canvas-wrap">
          <canvas id="canvas" width="640" height="640"></canvas>
          <div id="hint" class="hint">ツールを選んで世界をクリックしてみてください</div>
        </div>

        <aside class="panel right">
          <section class="card">
            <h2>環境を整える</h2>
            <div class="palette">
              <button class="tool" data-tool="food" title="栄養を撒く">
                <span class="ico ico-food"></span>
                <span>エサ</span>
              </button>
              <button class="tool" data-tool="light" title="光を当てる">
                <span class="ico ico-light"></span>
                <span>光</span>
              </button>
              <button class="tool" data-tool="water" title="水を引く">
                <span class="ico ico-water"></span>
                <span>水</span>
              </button>
              <button class="tool" data-tool="stone" title="障害物を置く">
                <span class="ico ico-stone"></span>
                <span>石</span>
              </button>
              <button class="tool" data-tool="erase" title="土地をならす">
                <span class="ico ico-erase"></span>
                <span>消す</span>
              </button>
            </div>
            <div class="brush">
              <label>ブラシの大きさ <span id="brush-n">5</span></label>
              <input id="brush" type="range" min="2" max="16" value="5" />
            </div>
            <div class="hud-hint">クリック or ドラッグで配置</div>
          </section>

          <section class="card">
            <h2>進化の記録</h2>
            <ul id="evo" class="evo">
              <li class="empty">まだ何も起きていない…</li>
            </ul>
          </section>

          <section class="card">
            <h2>最近の出来事</h2>
            <ul id="log" class="log"></ul>
          </section>

          <section class="card actions">
            <button id="reset">新しい皿へ</button>
            <button id="toggle-heat">環境ヒート表示</button>
          </section>
        </aside>
      </main>

      <footer class="footnote">
        制御するのではなく、条件を整え、振る舞いを引き出す。
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
